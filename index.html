<!DOCTYPE html> 
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>bombjessebusters</title>
<style>
  :root{
    --card-w:24px; --card-h:40px; --card-gap:3px;
    --char-w:40px; --char-h:60px;
    --item-w:50px; --item-h:75px;
    --role-char-scale: calc(var(--con-w) / var(--char-w));
    --con-w: var(--item-w); --con-h: var(--item-h); 
    --di-w:70px; --di-h:65px;
    /* テーブルの見えている枠は固定。内部だけ広げる */
    --table-h:96px; --header-h:8px;
    --content-h: calc(var(--table-h) - var(--header-h) - 6px);
    --content-extra: 18px;
    --font-card:16px; --font-weight:bold;
  }

  *,*::before,*::after{box-sizing:border-box}

  
  html{
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#fff;color:#111}
  header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #eee}
  h1{margin:0;font-size:18px}
  .small{font-size:12px;opacity:.75}
  .bold{font-weight:700}

  main{padding:10px 12px;display:flex;gap:12px; overflow:hidden;}
  .col{flex:1;min-width:0; overflow:visible;}
  .side{width:38%;max-width:420px}

  .join-box{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .join-box input{padding:8px;border:1px solid #ddd;border-radius:6px; font-size:16px;}
  .btn{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#f8f8f8;cursor:pointer}
  .btn.primary{background:#111;color:#fff;border-color:#111}
  .btn.menu-ink{background:#111;color:#fff;border-color:#111}
  .btn.small{padding:6px 10px;font-size:12px}
  .btn.big{padding:12px 14px;font-size:16px}
  .btn.ghost{background:transparent}
  .hidden{display:none!important}

  .fab{position:fixed;right:12px;bottom:12px;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;cursor:pointer;z-index:900}
  .menu{position:fixed;right:12px;bottom:64px;display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid #eee;border-radius:10px;padding:8px;box-shadow:0 12px 24px rgba(0,0,0,.08);z-index:210}
  .menu .btn{width:220px;text-align:left}

  /* ★ ホスト左下の工具ボタン */
  .host-tool{position:fixed;left:12px;bottom:12px;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;cursor:pointer;z-index:10}

  .items-bar{display:flex;align-items:center;gap:8px;margin-top:0}
  .items{display:flex;gap:6px;align-items:center;overflow-x:auto;overflow-y:visible;padding-top:10px}
  .item{
    position:relative; width:var(--item-w);height:var(--item-h);
    border:1px solid #ddd;border-radius:8px;background:#fff;
    background-size:cover;background-position:center;cursor:pointer;flex:0 0 auto
  }
  .item-face-layer{
    position:absolute;
    inset:0;
    background-size:cover, cover;
    background-position:center, center;
    background-repeat:no-repeat, no-repeat;
    border-radius:inherit;
    z-index:3;
    pointer-events:none;
  }
  .item-front-custom{ background-color:#fd8a21 !important; }
  .item-front-mark{
    position:absolute;
    top:3px;
    left:0px;
    display:flex;
    gap:1px;
    z-index:4;
    pointer-events:none;
  }
  .item-front-mark.two{ left:-1px; gap:0; }
  .item-front-mark.two .item-front-chip + .item-front-chip{ margin-left:-6px; }
  .item-front-chip{
    position:relative;
    width:18px;
    height:18px;
    border:none;
    border-radius:0;
    background:transparent;
    overflow:visible;
  }
  .item-front-chip img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  .item-front-chip .num{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    transform:translateY(-4px);
    color:#fff;
    font-size:10px;
    line-height:1;
    font-weight:800;
    white-space:nowrap;
    text-shadow:0 1px 2px rgba(0,0,0,.75);
  }
  .item-front-chip .yellow-square{
    position:absolute;
    width:8px;
    height:8px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) translateY(-2.2px);
    background:#fde047;
    border:1px solid #000;
  }
  .item-usebar{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:6px;
    background:#000;
    color:#fff;
    font-size:6px;
    line-height:6px;
    font-weight:700;
    text-align:center;
    border-radius:0 0 9px 9px;
    pointer-events:none;
    z-index:2;
    white-space:nowrap;
    overflow:visible;
  }
  .item-textbox{
    position:absolute;
    left:2px;
    right:2px;
    bottom:11px;
    background:#fff;
    color:#000;
    border:1px solid #fff;
    border-radius:1px;
    padding:1px 0 0;
    overflow:visible;
    z-index:2;
    pointer-events:none;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    gap:0;
  }
  .item-textbox .name{
    margin:0;
    width:100%;
    box-sizing:border-box;
    padding:0;
    font-size:7px;
    line-height:1.05;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
    word-break:break-word;
  }
  .item-textbox .desc{
    margin:0;
    width:100%;
    box-sizing:border-box;
    padding:0;
    font-size:7px;
    line-height:1.1;
    white-space:pre-wrap;
    overflow:visible;
    word-break:break-word;
  }
  .item-textbox.compact .desc{
    font-size:6px;
    line-height:1.05;
  }
  .item-textbox.desc-five-lines{
    bottom:6.1px;
  }
  .item.alt-rule::after{
    content:'×';
    position:absolute;
    top:-15px;
    left:50%;
    transform:translateX(-50%);
    color:#dc2626;
    font-size:16px;
    font-family:'Arial Black','Segoe UI Symbol','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
    font-weight:900;
    line-height:1;
    -webkit-text-stroke:.4px #dc2626;
    text-shadow:0 0 .01px #dc2626;
    pointer-events:none;
    z-index:3;
  }
  .item.alt-rule.item-raised{ transform:translateY(-8px); }
  .item.alt-rule.item-raised::after{ display:none; }
  .item.used{background:#fff url('./itemback.jpg') center/cover no-repeat}
  .m12-overlay-num{
    position:absolute;
    left:50%;
    top:20px;
    transform:translateX(-50%);
    z-index:4;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    overflow:visible;
  }
  /* ★ M12：アイテムの下に付ける小型数値バッジ */
  .num-badge{
    position:absolute; left:50%; transform:translateX(-50%);
   bottom:-14px; min-width:18px; height:18px; padding:0 4px;
    border-radius:9px; border:1px solid #ddd; background:#fff;
    font-size:12px; line-height:18px; text-align:center;
   box-shadow:0 2px 6px rgba(0,0,0,.12); pointer-events:none;
  }


 .di{ margin-left:auto;width:var(--di-w);height:var(--di-h);border-radius:10px;　border:none;　background:#fff;
    background-size:cover;background-position:center;cursor:pointer;flex:0 0 auto ;background-size:contain;}

/* ▼ 数値カードの表示帯（アイテム下など） */
  .numlane { display:flex; gap:6px; margin-top:6px; align-items:center; overflow-x:auto; }
  .numcard { width:32px; height:48px; border-radius:6px; border:1px solid #ddd; background:#fff center/cover no-repeat; flex:0 0 auto; }
  .numdeck { width:32px; height:48px; border-radius:6px; border:1px solid #ddd; background:#fff url('./numberdeck.png') center/contain no-repeat; cursor:pointer; user-select:none; display:grid; place-items:center; }
  .numrest { font-size:11px; opacity:.7; margin-left:2px; }
  .deck-stack{ position:relative; cursor:pointer; user-select:none; flex:0 0 auto; }
  .deck-stack.number{ width:32px; height:48px; }
  .deck-stack.constraint{ width:32px; height:48px; }
  .deck-stack.empty{ border:1px dashed #bbb; border-radius:8px; background:#fff; }
  .deck-layer{ position:absolute; border:1px solid #ddd; background:#fff center/contain no-repeat; pointer-events:none; }
  .deck-stack.number .deck-layer{ width:32px; height:48px; border-radius:6px; }
  .deck-stack.constraint .deck-layer{ width:32px; height:48px; border-radius:6px; }

  /* ★ 右2/左2/右4/左4 を横向きに（横長） */
  .rulecard { width:48px; height:32px; border-radius:6px; border:1px solid #ddd; background:#fff center/contain no-repeat; flex:0 0 auto; }

  /* ★ 数値カードの「重ね」用ホルダー＆オーバーレイ */
  .numcard-holder { position:relative; width:32px; height:48px; flex:0 0 auto; }
  .numcard.overlay { position:absolute; left:2px; top:2px; opacity:1; }
  .numcard.overlay:nth-child(3){ left:4px; top:4px; opacity:0.85; }
  .numcard.overlay:nth-child(4){ left:6px; top:6px; opacity:0.8; }
.conlane { display:flex; gap:6px; margin-top:6px; align-items:center; overflow-x:auto; }
  .concard {
    /* ここから変更 */ width:var(--con-w, var(--item-w, 50px)); height:var(--con-h, var(--item-h, 75px)); /* ここまで変更 */
    border-radius:8px; border:1px solid #ddd;
    background:#fff;
    background-image:none; flex:0 0 auto; cursor:pointer;
  }
  .m55-lane{
    flex-wrap:wrap;
    overflow:visible;
    gap:8px;
  }
  .m55-lane.five-plus{
    max-width:calc(var(--con-h) * 3 + 16px);
  }
  .m55-card-wrap{
    position:relative;
    flex:0 0 auto;
  }
  .m55-card-wrap.c8-spacing{
    margin-inline:14px;
  }
  .challenge-card{
    position:relative;
    width:var(--con-h);
    height:var(--con-w);
    border-radius:8px;
    border:5px solid #de3e34;
    background:#fff;
    background-image:none;
    overflow:visible;
    -webkit-clip-path:inset(0 round 8px);
    clip-path:inset(0 round 8px);
  }
  .challenge-card::before{ display:none; }
  .challenge-card.back-face{
    border:none;
    background-color:transparent;
    -webkit-clip-path:none;
    clip-path:none;
    overflow:hidden;
  }
  .challenge-num{
    position:absolute;
    left:50%;
    top:-6px;
    width:9px;
    height:9px;
    display:grid;
    place-items:center;
    text-align:center;
    color:#fff;
    font-size:7px;
    font-weight:800;
    background:#000;
    border-radius:50%;
    transform:translateX(-50%);
    z-index:5;
    pointer-events:none;
    line-height:1;
  }
  .challenge-textbox{
    position:absolute;
    left:1px;
    right:1px;
    top:4px;
    border:1px solid #fff;
    background:#fff;
    color:#000;
    border-radius:4px;
    padding:0 0 0;
    font-size:6px;
    line-height:1.15;
    font-weight:700;
    white-space:pre-wrap;
    z-index:2;
    pointer-events:none;
    max-height:29px;
    overflow:hidden;
  }
  .challenge-pattern-row{
    position:absolute;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    display:flex;
    gap:0.8px;
    justify-content:center;
    align-items:center;
    z-index:3;
    pointer-events:none;
  }
  .challenge-pattern-chip{
    width:5px;
    height:8px;
    padding:0 1px;
    border-radius:1px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    color:#fff;
    font-size:6px;
    line-height:1;
    font-weight:800;
  }
  .challenge-pattern-chip.black{ background:#000; }
  .challenge-pattern-chip.gray{ background:#8a8a8a; }
  .challenge-pattern-group{
    display:flex;
    gap:1px;
    border:1px solid #2563eb;
    border-radius:2px;
    padding:0.5px;
  }
  .challenge-pattern-row.c4-spaced{
    gap:1.8px;
  }
  .challenge-pattern-chip.c4-dashed{
    width:8px;
    height:8px;
    border:0.9px dashed #9ca3af;
    border-radius:2px;
    background:transparent;
    color:#111;
    align-items:center;
    line-height:1;
    padding:0;
  }
  .challenge-pattern-chip.green-circle{
    background:radial-gradient(circle at center, rgba(34,197,94,.30) 0 60%, transparent 61%);
    border-radius:2px;
  }
  .m55-c8-side{
    width:32px;
    height:48px;
    border-radius:6px;
    border:1px solid #ddd;
    background:#fff center/cover no-repeat;
    position:absolute;
    top:50%;
    z-index:4;
    box-shadow:0 3px 10px rgba(0,0,0,.18);
  }
  .m55-c8-side.left{
    left:-9px;
    transform:translate(-45%,-50%) rotate(-10deg);
  }
  .m55-c8-side.right{
    right:-9px;
    transform:translate(45%,-50%) rotate(10deg);
  }
  .conzoom-card.challenge-zoom{
    width:var(--con-h);
    height:var(--con-w);
    overflow:hidden;
  }
  .constraint-face{
    position:relative;
    border:3px solid #6a3f75 !important;
    border-top-width:10px !important;
    background:#fff !important;
    background-image:none !important;
    background-size:auto !important;
    background-position:center !important;
    background-repeat:no-repeat !important;
    overflow:visible;
  }
  .constraint-face::before{
    content:'';
    position:absolute;
    top:-9px;
    left:-1px;
    width:12px;
    height:12px;
    background:url('./eyeband.png') center/contain no-repeat;
    z-index:3;
    pointer-events:none;
  }
  .constraint-face::after{
    content:'制約';
    position:absolute;
    top:-7px;
    right:10px;
    color:#fff;
    font-size:5px;
    line-height:1;
    font-weight:700;
    letter-spacing:.02em;
    z-index:2;
    pointer-events:none;
  }
  .constraint-face .constraint-alpha{
    position:absolute;
    top:-10px;
    right:-2px;
    color:#fff;
    font-size:12px;
    line-height:1;
    font-weight:700;
    text-transform:uppercase;
    background:#6a3f75;
    padding:0 2px 2px;
    border-radius:2px 10px 2px 2px ;
    z-index:2;
    pointer-events:none;
  }
  .constraint-face .constraint-desc{
    position:absolute;
    left:2px;
    right:2px;
    top:4px;
    bottom:3px;
    color:#000;
    font-size:6px;
    line-height:1.25;
    font-weight:700;
    text-align:left;
    white-space:pre-wrap;
    word-break:break-word;
    overflow:hidden;
    pointer-events:none;
  }

  .constraint-face .constraint-desc.constraint-desc-h{
    left:2px;
    right:2px;
    top:5px;
    bottom:2px;
    line-height:1.15;
    font-weight:600;
  }
  .constraint-face.constraint-stacked-under::before,
  .constraint-face.constraint-stacked-under::after,
  .constraint-face.constraint-stacked-under .constraint-alpha,
  .constraint-face.constraint-stacked-under .constraint-desc{
    display:none;
  }
  .constraint-card-ui{
    position:relative;
    border-style:solid !important;
    border-color:#6e6770 !important;
    border-width:20px 8px 8px 8px !important;
    background-color:#fff !important;
    background-image:none !important;
    overflow:hidden;
  }
  .constraint-eyeband{
    position:absolute;
    top:-4px;
    left:-4px;
    width:13px;
    height:13px;
    object-fit:contain;
    pointer-events:none;
    z-index:2;
  }
  .constraint-topbar{
    position:absolute;
    top:-20px;
    left:0;
    right:0;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:3px;
    padding:1px 2px 1px 4px;
    pointer-events:none;
    z-index:1;
  }
  .constraint-topbar .jp{
    font-size:8px;
    color:#fff;
    font-weight:700;
    line-height:1;
  }
  .constraint-topbar .en{
    min-width:15px;
    height:16px;
    padding:0 2px;
    border-radius:3px;
    background:#6e6770;
    color:#fff;
    font-size:12px;
    font-weight:800;
    line-height:16px;
    text-align:center;
  }

  #conZoomOverlay{
    position:fixed; inset:0; background:rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    z-index:9999;
  }
  .conzoom-wrap{ position:relative; }
 .conzoom-card{
    /* ここから変更 */ width:var(--con-w, var(--item-w, 50px)); height:var(--con-h, var(--item-h, 75px)); /* ここまで変更 */
    transform:scale(2); transform-origin:center;
    border-radius:8px; border:1px solid #ddd; background:#fff center/cover no-repeat;
    box-shadow:0 10px 30px rgba(0,0,0,.35); cursor:pointer;
    position:relative; overflow:visible;
  }
  .conzoom-card .item-usebar{ border-radius:0 0 9px 9px; }
  .conzoom-menu{
    position:absolute; top:50%; left:50%;
    translate:-50% calc(-50% + 108px);
    background:transparent; border:none; border-radius:10px;
    padding:4px 0; display:flex; gap:8px; z-index:10000;
    flex-wrap:nowrap;
    box-shadow:none;
  }
  .conzoom-menu button{
    font-size:14px; padding:6px 10px; border-radius:8px;
    border:1px solid #ccc; background:#f7f7f7; cursor:pointer;
    white-space:nowrap;
  }
  
  /* ★ ミッション12：アイテムの“外側の真下”に並べる帯 */
  .num-under{
    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:var(--item-w); /* アイテム幅に合わせて1列=1アイテム */
    gap:6px;               /* .items の gap と合わせる */
    margin-top:4px;        /* アイテム列のすぐ下に表示 */
    align-items:start;
    justify-content:start;
    width:max-content;     /* はみ出し対策：内容幅に合わせる */
  }
  .num-under .slot{
    width:var(--item-w);
    display:grid;
    place-items:center;    /* 中央配置 */
  }
  .num-under .numcard-holder{
    position:relative;
    width:32px; height:48px;
  }
  
  .tables{display:flex;flex-direction:column;gap:8px;margin-top:6px;overflow:visible;position:relative;margin-left:-12px;}
  .table{
    position:relative;border:1px dashed #ddd;border-radius:10px;
    padding:0 8px;height:var(--table-h);display:block;background:#fff;
    overflow:hidden;width:max-content;z-index:0;
 transition: none; 
  }
  .table.anim-h{
  transition: height .25s ease;  /* ← 必要時だけ付ける */
}
  .table.elevated{ z-index:200; }
  .table.i2-table-selectable{
    outline:2px dashed #38bdf8;
    outline-offset:-2px;
    cursor:pointer;
  }
  .table.i2-table-selected{
    outline:2px solid #38bdf8;
    outline-offset:-2px;
  }

  .t-header{height:var(--header-h);display:flex;align-items:center;gap:6px;font-size:12px;margin-top:0;}
  .title{text-decoration:underline;padding-right:4px}

  .t-content{
    position:absolute;left:8px;right:8px;top:calc(var(--header-h) + 2px);bottom:calc(4px - var(--content-extra));
    display:flex;gap:8px;align-items:flex-start;min-height:var(--content-h);overflow:visible;
  }

  .char-card{
    width:var(--char-w);height:var(--char-h);background-size:cover;background-position:center;border-radius:6px;border:1px solid #ddd;
    cursor:pointer;user-select:none;flex:0 0 auto;
  }
  /* ▼ M61: 制約カードの後ろに重ねる正体カード（通常サイズ） */
  .m61-mini{
    width:var(--char-w); height:var(--char-h);
    border:1px solid #ddd; border-radius:6px;
    background:#f3f4f6 center/cover no-repeat;
    margin:2px auto 0; user-select:none; cursor:pointer;
    position:relative; z-index:1;
  }
  .m61-mini.blank{ background:#f3f4f6; border:1px dashed #d1d5db; cursor:default; }
  /* 縦積みラッパー */
  .m61-stack{ display:flex; flex-direction:column; align-items:center; width:var(--char-w); }

  /* ★ #13：キャラと下部トークンを縦積みするためのラッパー */
  .char-col{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    width:var(--char-w); flex:0 0 auto;
    position:relative;
  }
  /* #31 / #61: 制約カードの後ろに重ね、上半分を隠す */
  .char-col > .m61-mini,
  .m61-stack > .m61-mini{
    margin-top:calc(var(--char-h) * -0.5);
  }
  .char-col > .char-card,
  .m61-stack > .m61-con{
    position:relative;
    z-index:2;
  }
  
  .char-card.blank{background:#f3f4f6;border:1px dashed #d1d5db;cursor:default;}

  .char-card.member5-card,
  .m61-mini.member5-card,
  .char-card.member15-detector,
  .m61-mini.member15-detector,
  .role-card.member5-card,

function renderStageStory(v){
  const missionId = Number(v?.mission?.id || 0);

  const mySeatIdx = getMySeatedTableIndex(v);
  if (mySeatIdx != null) { H(stageStoryPop, true); return; }
  stageStoryTitle.textContent = def.title;
  stageStoryNum.innerHTML = `<span class="hash">#</span>${missionId}`;
  stageStoryBody.textContent = def.body;
  if (stageStoryImageMissions.has(missionId)) {
    stageStoryImage.src = `./P${missionId}.png`;
    stageStoryPop.classList.add('has-mission-image');
    H(stageStoryImage, false);
  } else {
    stageStoryImage.removeAttribute('src');
    stageStoryPop.classList.remove('has-mission-image');
    H(stageStoryImage, true);
  }
  H(stageStoryPop, false);
}

function bindAudioVolHold(button, stepFn){
  if (!button) return;
  button.onpointerdown = (ev)=>{
    ev.preventDefault();
    stepFn();
    clearAudioVolHold();
    audioVolHoldDelayTimer = setTimeout(()=>{
      audioVolHoldInterval = setInterval(stepFn, AUDIO_VOL_HOLD_INTERVAL_MS);
    }, AUDIO_VOL_HOLD_DELAY_MS);
  };
  button.onpointerup = clearAudioVolHold;
  button.onpointercancel = clearAudioVolHold;
  button.onpointerleave = clearAudioVolHold;
}

function getMissionAudio(mid){
  if ((mid|0) === 19) return document.getElementById('m19Audio');
  if ((mid|0) === 30) return document.getElementById('m30Audio');
  if ((mid|0) === 42) return document.getElementById('m42Audio');
  return null;
}

function ensureMissionAudioContext(){
  if (missionAudioGraph.ctx) return missionAudioGraph.ctx;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  try{
    missionAudioGraph.ctx = new Ctx();
  }catch(_e){
    missionAudioGraph.ctx = null;
  }
  return missionAudioGraph.ctx;
}

function ensureMissionAudioGain(mid, audio){
  if (!audio) return null;
  const key = `m${mid|0}`;
  const ctx = ensureMissionAudioContext();
  if (!ctx) return null;
  let gain = missionAudioGraph.gains[key];
  try{
    if (!missionAudioGraph.sources.has(audio)){
      const src = ctx.createMediaElementSource(audio);
      if (!gain){
        gain = ctx.createGain();
        missionAudioGraph.gains[key] = gain;
      }
      src.connect(gain);
      gain.connect(ctx.destination);
      missionAudioGraph.sources.set(audio, src);
    } else if (!gain){
      gain = ctx.createGain();
      missionAudioGraph.gains[key] = gain;
      const src = missionAudioGraph.sources.get(audio);
      src.connect(gain);
      gain.connect(ctx.destination);
    }
  }catch(_e){
    return null;
  }
  return gain;
}

function updateMissionAudioVolume(mid){
  const key = `m${mid|0}`;
  const vol = clamp(Number(audioVolumes[key] ?? 1), 0, 1);
  const audio = getMissionAudio(mid);
  if (!audio) return;

  const gain = ensureMissionAudioGain(mid, audio);
  if (gain){
    try{ gain.gain.setValueAtTime(vol, gain.context.currentTime); }catch(_e){ gain.gain.value = vol; }
    audio.volume = 1;

function renderMissionAudioVolume(v){
  const mid = (v?.mission?.id|0);
  const isAudioMission = isAudioMissionId(mid);
  if (!isAudioMission) audioVolumeDockOpen = false;
  applyAudioVolumeDockVisibility(v);
  if (!isAudioMission) return;

  const key = `m${mid}`;
  const applyMissionVolume = (next)=>{
    const clamped = clamp(Number(next), 0, 1);
    audioVolumes[key] = clamped;
    if (audioVolumeRange) audioVolumeRange.value = String(clamped);
    if (audioVolumeValue) audioVolumeValue.textContent = `${Math.round(clamped * 100)}%`;
    updateMissionAudioVolume(mid);
  };

  const current = Number(audioVolumes[key] ?? 1);
  if (audioVolumeRange){
    audioVolumeRange.value = String(current);
    audioVolumeRange.oninput = ()=>{
      applyMissionVolume(audioVolumeRange.value||'1');
    };
  }
  bindAudioVolHold(audioVolDown, ()=> applyMissionVolume((Number(audioVolumes[key] ?? 1) - AUDIO_VOL_STEP).toFixed(2)));
  bindAudioVolHold(audioVolUp, ()=> applyMissionVolume((Number(audioVolumes[key] ?? 1) + AUDIO_VOL_STEP).toFixed(2)));
  applyMissionVolume(current);
}

function fitConstraintDesc(node, letter){
  const desc = node?.querySelector('.constraint-desc');
  if (!desc) return;

  // 要望対応：制約カードHの説明のみ、白枠内に収まるまで自動で縮小
  desc.classList.toggle('constraint-desc-h', letter === 'H');
  desc.style.fontSize = '';
  if (letter !== 'H') return;

  const minFont = 4.8;
  let size = parseFloat(getComputedStyle(desc).fontSize) || 6;
  let retries = 0;

  const adjust = () => {
    // 非表示中などでサイズが取れない場合は少し待って再試行
    if ((desc.clientHeight === 0 || desc.clientWidth === 0) && retries < 2){
      retries += 1;
      requestAnimationFrame(adjust);
      return;
    }

    while (size > minFont && (desc.scrollHeight > desc.clientHeight || desc.scrollWidth > desc.clientWidth)){
      size = +(size - 0.1).toFixed(2);
      desc.style.fontSize = `${size}px`;
    }
  };

  adjust();
}

  itemsBar.insertAdjacentElement('afterend', under);

  // 未使用数字から必要枚数ぶん抽選
  const need  = items.length * eachCount;
  const picks = pickUnusedNumbers(need);

  // アイテム数に合わせて同数のスロットを用意し、中央にカードを配置
  let p = 0;
  items.forEach(()=> {
    const slot = document.createElement('div');
    slot.className = 'slot';
    under.appendChild(slot);

    for(let k=0; k<eachCount; k++){
      const n = picks[p++]; if(n==null) break;
      // placeNumberCard は holder を作って mountParent に追加する
      placeNumberCard(n, slot);
    }
  });
}

/**
 * ミックス実行
 */
function executeMixPlan(planList){
  const toAdd = [];
  const mixLines = [];
  const chooseLines = [];

  planList.forEach(p=>{
    if(p.type==='redPick'){
      const src = Array.isArray(p.fromList) && p.fromList.length ? p.fromList : MATERIALS.redCodes;
      const cand = pickK(src, p.k);
      cand.forEach(n=> toAdd.push({num:n, kind:'red'}));
      mixLines.push('<span style="color:red;">●</span>' + cand.map(v=>`[${v}]`).join(''));
    }
    if(p.type==='yellowPick'){
      const src = Array.isArray(p.fromList) && p.fromList.length ? p.fromList : MATERIALS.yellowCodes;
      const cand = pickK(src, p.k);
      cand.forEach(n=> toAdd.push({num:n, kind:'yellow'}));
　     mixLines.push('<span style="color:gold;">▧</span>' + cand.map(v=>`[${v}]`).join(''));
    }
        if(p.type==='yellowFixed'){
      const cand = (p.list || []).slice();
      cand.forEach(n => toAdd.push({ num:n, kind:'yellow' }));
      mixLines.push('<span style="color:gold;">▧</span>' + cand.map(v=>`[${v}]`).join(''));
    }
    if(p.type==='redChoose'){
      const src = Array.isArray(p.fromList) && p.fromList.length ? p.fromList : MATERIALS.redCodes;
      const cand = pickK(src, p.from);
      chooseLines.push(`<span style="color:red;">●</span> ${cand.map(v=>`[${v}]`).join(' ')} のうち${p.take}つ`);
      const take = pickK(cand, p.take);
      take.forEach(n=> toAdd.push({num:n, kind:'red'}));
    }
    if(p.type==='yellowChoose'){
      const src = Array.isArray(p.fromList) && p.fromList.length ? p.fromList : MATERIALS.yellowCodes;
      const cand = pickK(src, p.from);
      chooseLines.push(`<span style="color:gold;">▧</span> ${cand.map(v=>`[${v}]`).join(' ')} のうち${p.take}つ`);
      const take = pickK(cand, p.take);
      take.forEach(n=> toAdd.push({num:n, kind:'yellow'}));
    }
  });

  return { toAdd, mixLines, chooseLines };
}

/* pop positioning */
function placeInsideViewport(div, x, y){
  popLayer.appendChild(div);
  const pad = 8;
  pos(div, x + 6, y + 6);
  let r = div.getBoundingClientRect();
  if (r.right > innerWidth - pad){ const nx = Math.max(pad, x - r.width - 6); pos(div, nx, y + 6); r = div.getBoundingClientRect(); }
  if (r.left < pad) pos(div, pad, r.top);
  if (r.top < pad) pos(div, r.left, pad);
  if (r.bottom > innerHeight - pad) pos(div, r.left, Math.max(pad, innerHeight - r.height - pad));
}

function allTablesSeated(v){
  const tables = Array.isArray(v?.tables) ? v.tables : [];
  return tables.length > 0 && tables.every(t => !!t?.playerId);
}

function isMission27Or28RoleHidden(v, idx, t){
  const mid = (v?.mission?.id|0);
  if (!t?.playerId) return false;
  if (mid === 27) return !!v?.meta?.m27_autoHiddenAfterSeat;
  if (mid === 28) return !!v?.meta?.m28_autoHiddenAfterSeat && ((v?.captainTable|0) === (idx|0));
  return false;
}

async function applyMission27Or28Hide(code, missionId){
  const roomRef = ref(db, `rooms/${code}`);
  const snap = await get(roomRef);
  const room = snap.val() || {};
  const mid = (room?.mission?.id|0);
  if (mid !== missionId) return;
  if (!allTablesSeated(room)) return;

  if (missionId === 27 && room?.meta?.m27_autoHiddenAfterSeat) return;
  if (missionId === 28 && room?.meta?.m28_autoHiddenAfterSeat) return;

  const metaPatch = (missionId === 27)
    ? { m27_autoHiddenAfterSeat: true }
    : { m28_autoHiddenAfterSeat: true };

  await update(roomRef, { meta: { ...(room.meta || {}), ...metaPatch } });
}

async function handleMission27And28AutoHide(v){
  const mid = (v?.mission?.id|0);
  if (mid !== 27 && mid !== 28){
    clearMission27And28AutoHideTimer();
    return;
  }

  const done = (mid === 27) ? !!v?.meta?.m27_autoHiddenAfterSeat : !!v?.meta?.m28_autoHiddenAfterSeat;
  if (done){
    clearMission27And28AutoHideTimer();
    return;
  }
  if (!state.isHost || !allTablesSeated(v)){
    clearMission27And28AutoHideTimer();
    return;
  }

  const key = `${state.roomCode}:${mid}`;
  if (state._m2728Timer && state._m2728TimerKey === key) return;
  clearMission27And28AutoHideTimer();
  state._m2728TimerKey = key;
  state._m2728Timer = setTimeout(async ()=>{
    clearMission27And28AutoHideTimer();
    await applyMission27Or28Hide(state.roomCode, mid);
  }, 1000);
}


// ▼ テーブル高さの差分適用（変化がある時だけ更新＆その時だけアニメ）
// ▼ テーブル高さの差分適用（“直前論理値”で判定）
// ・初回はアニメしない
// ・同じ値なら何もしない
// ・増える時だけアニメ（減る時は瞬時反映でチラつき防止）
function applyTableHeight(box, needPx){
  const prevStr = box.dataset.prevH || "";           // 直前論理値（文字列）
  const prev = prevStr === "" ? null : parseInt(prevStr, 10);

  if (prev !== null && prev === needPx) return;      // 変化なし

  const doAnimate = (prev !== null) && (needPx > prev);

  if (doAnimate){
    box.classList.add('anim-h');
  } else {
    box.classList.remove('anim-h');                  // 初回や縮む時は即時反映
  }

  box.style.setProperty('--table-h', `${needPx}px`);
  box.style.height = `${needPx}px`;

  box.dataset.prevH = String(needPx);                // 次回比較用に保存

  if (doAnimate){
    setTimeout(()=> box.classList.remove('anim-h'), 300);
  }
}


  // ▼▼ カード下トークン（.tok-col）の“実測下端”に合わせて、必要時のみテーブルを伸ばす ▼▼
// 対象：数字 / x1・x2・x3 / 偶数 / 奇数 / ＝ / ≠ （= .tok-col に並ぶ .token）
function growForCardTokens(box, basePx = 96, padPx = 6){
  // テーブル内の各カードバッジ直下にあるトークン列を全部見る
  const cols = box.querySelectorAll('.badge-fixed .tok-col');
  if (!cols.length) return;

  let needs = false;
  let maxBottom = 0;
  const rBox = box.getBoundingClientRect();

  cols.forEach(col=>{
    const cnt = col.querySelectorAll('.token').length | 0;
    // ――― 1行（=1個）以下なら一切スライドしない
    if (cnt >= 2){
      needs = true;
      const r = col.getBoundingClientRect();
      maxBottom = Math.max(maxBottom, r.bottom);
    }
  });

  if (!needs) return; // 2個以上の列が無ければ何もしない（アニメも発生しない）

  // テーブル上端から“最も下に出たトークン列の下端”までの高さに少しパディングを足す
  const needPx = Math.max(basePx, Math.ceil(maxBottom - rBox.top + padPx));
  applyTableHeight(box, needPx);
}

    const maskRedYellowInDetails = (root)=>{
      root.querySelectorAll('.line').forEach(line=>{
        const t = line.textContent || '';
        if (t.includes('●') || t.includes('▧')) {
          line.textContent = t.replace(/\[[^\]]+\]/g, '[?]');
        }
      });
    };

    // 既に隠すフラグが立っていたら即マスク
    if (hidden) {
      maskRedYellowInDetails(missionDetailBody);
    } else {
      // まだなら「OK」タブを1回だけ出す（詳細をクリックしたタイミングで表示）
      if (!missionDetailBody.dataset.m50Hooked) {

            await update(ref(db, `rooms/${state.roomCode}/meta`), { m50_hidden: true });
          };

function itemFrontLabel(itemNo){
  if(itemNo===14) return '2';
  if(itemNo===15) return '3';
  if(itemNo===16) return '10';
  if(itemNo===17) return '9';
  if(itemNo===18) return '11';
  return String(itemNo);
}

function appendItemTextBox(el, itemNo){
  const info = ITEM_TEXTS[itemNo];
  if(!info) return;

  const minDescCharsPerLine = 8.5;
  const minDescFontSize = 6;
  const defaultDescFontSize = 7;

  const box = document.createElement('div');
  box.className = 'item-textbox';

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = info.name;

  const desc = document.createElement('div');
  desc.className = 'desc';
  desc.textContent = info.desc;

  box.appendChild(name);
  box.appendChild(desc);
  el.appendChild(box);

  requestAnimationFrame(()=>{
    let size = 7;
    while(size > 3 && (name.scrollWidth > name.clientWidth || name.scrollHeight > name.clientHeight)){
      size = +(size - 0.2).toFixed(2);
      name.style.fontSize = `${size}px`;
    }

    const descWidth = desc.clientWidth;
    let descSize = defaultDescFontSize;
    if(descWidth > 0){
      const maxSizeForMinChars = +(descWidth / minDescCharsPerLine).toFixed(2);
      descSize = Math.min(defaultDescFontSize, maxSizeForMinChars);
    }
    descSize = Math.max(minDescFontSize, descSize);
    desc.style.fontSize = `${descSize}px`;

    while(descSize > minDescFontSize && (desc.scrollHeight > desc.clientHeight || box.scrollHeight > box.clientHeight)){
      descSize = +(descSize - 0.2).toFixed(2);
      desc.style.fontSize = `${descSize}px`;
    }

    const lineHeight = parseFloat(getComputedStyle(desc).lineHeight) || 0;
    const descLineCount = lineHeight > 0 ? Math.round(desc.scrollHeight / lineHeight) : 0;
    if(descLineCount >= 5){
      box.classList.add('desc-five-lines');
    }
  });
}

/* ===== Mission Complete (all normal & yellow open) ===== */
/* ★ 黒(normal)＆黄(yellow)が「手札で未公開0枚」になったら1度だけ完了ポップ */
function renderMissionComplete(v){
  try{
    if(!v || !Array.isArray(v.tables)) return;
    const mid = (v?.mission?.id|0) || 0;
    if(!mid) return;

    // ★ M29/M57 の処理中は中間スナップショットを評価しない
    const busy = !!(v?.meta?.m29_busy) || !!(v?.meta?.m57_busy);
    if (busy) return;

    // 黒(normal)と黄(yellow)のみ対象（手札のみ）
    const cards = [];
    (v.tables||[]).forEach(T=>{
      (T.hand||[]).forEach(c=>{
        // ★ 中間個体は除外：null/undefined, gone:true, num未定義
        if(!c || c.gone===true || c.num==null) return;
        if (c.kind === 'normal' || c.kind === 'yellow') cards.push(c);
      });
    });

    // 未公開（open!==true）の枚数。ただし上で中間個体は既に除外済み
    const unopened = cards.filter(c => c.open !== true).length;

    // ▼ スパートタイマー制御（既存仕様を踏襲）
    const nearComplete = (unopened === 2 || unopened === 1);
    if (nearComplete && !state._spTimerOn){
      const at = getSpTimerAudio();
      try{ at.loop = true; at.currentTime = 0; at.play().catch(()=>{}); state._spTimerOn = true; }catch(_e){}
    }
    // 2枚/1枚 以外になったら停止（>2枚 もしくは 0枚＝全公開）
    if (!nearComplete && state._spTimerOn){
      const at = getSpTimerAudio();
      try{ at.pause(); at.currentTime = 0; }catch(_e){}
      state._spTimerOn = false;
    }

    // ここから通常の「全公開」判定へ
    if (cards.length === 0) return;
    const allOpen = unopened === 0;
    if (!allOpen) return;

    // 同一ミッション内で一度だけ表示
    if (state._mcShownMissionId === mid) return;
    state._mcShownMissionId = mid;

    // ポップ生成（左→中央へ：既存CSS .mission-complete-pop を使用）
    const id = 'missionCompletePop';
    const old = document.getElementById(id);
    if (old) old.remove();

    const div = document.createElement('div');
    div.id = id;
    div.className = 'mission-complete-pop';
    div.textContent = 'ミッション完了!!';
    document.body.appendChild(div);

    // 効果音（comp.mp3）再生
    try{
      const au = new Audio('./comp.mp3');
      au.currentTime = 0;
      au.play().catch(()=>{});
    }catch(_e){}

    // 3秒後に自動で閉じる（任意）
    setTimeout(()=>{ const x=document.getElementById(id); if(x) x.remove(); }, 3000);
  }catch(e){
    console.error('renderMissionComplete failed', e);
  }
}

function deriveChecklistCodeHints(displayLines){
  const out = {
    redCertain: new Set(), redMaybe: new Set(),
    yellowCertain: new Set(), yellowMaybe: new Set(),
  };
  (displayLines||[]).forEach(raw=>{
    const line = String(raw||'');
    const isRed = line.includes('●');
    const isYellow = line.includes('▧');
    if(!isRed && !isYellow) return;

    const nums = Array.from(line.matchAll(/\[(\d+(?:\.\d+)?)\]/g))
      .map(m=>Math.floor(Number(m[1])))
      .filter(n=>Number.isInteger(n) && n>=1 && n<=12);
    if(nums.length===0) return;

    const takeM = line.match(/のうち\s*(\d+)\s*つ/);
    const take = takeM ? Number(takeM[1]) : null;
    const isCertain = (take==null) || (take >= nums.length);

    const add = (certainSet, maybeSet)=>{
      nums.forEach(n=>{
        if(isCertain){
          certainSet.add(n);
          maybeSet.delete(n);
        }else if(!certainSet.has(n)){
          maybeSet.add(n);
        }
      });
    };

    if(isRed) add(out.redCertain, out.redMaybe);
    if(isYellow) add(out.yellowCertain, out.yellowMaybe);
  });
  return out;
}

async function incToken(kind, delta){
  try {
    const path = `rooms/${state.roomCode}/meta/tokenCounts`;
    const snap = await get(ref(db, path));
    const prev = snap.val() || { equal:0, noteq:0, x1:0 };
    const next = { ...prev, [kind]: Math.max(0, (prev[kind] || 0) + delta) };
    await set(ref(db, path), next);
  } catch (e) {
    console.error('incToken failed', e);
  }
}

function renderM22PickPanel(v){
  // ミッション22以外は消す
  if (!v?.mission?.id || v.mission.id !== 22) {
    if (m22PickPanel) m22PickPanel.classList.add('hidden');
    return;
  }
  // 自分が未着席なら消す
  const myIdx = (v.tables||[]).findIndex(T => T.playerId === state.userId);
  if (myIdx < 0) { if (m22PickPanel) m22PickPanel.classList.add('hidden'); return; }

  const myTable = v.tables[myIdx] || {};
  // すでに完了しているなら表示しない
  if (myTable.m22Done) { m22PickPanel.classList.add('hidden'); return; }

  // 手札にある整数の集合
  const myHandInts = new Set((myTable.hand||[])
    .filter(c => Number.isInteger(c.num))
    .map(c => c.num|0));

  // 候補 = 1..12 から手札に無い数字
  const candidates = [];
  for (let n=1; n<=12; n++) if (!myHandInts.has(n)) candidates.push(n);

  // 既に自分が選んだトークン
  const picked = Array.isArray(myTable.m22Tokens) ? myTable.m22Tokens.slice(0,2) : [];
  const pickedSet = new Set(picked);

  // 上限：候補が1つなら1、2つ以上なら2
  const maxPick = Math.min(2, candidates.length);

  // もう必要数選び終わってたら閉じる（他端末で同期していてもOK）
  if (picked.length >= maxPick) {
    // DBにも完了フラグを残す（再表示防止）
    update(ref(db, `rooms/${state.roomCode}/tables/${myIdx}`), { m22Done: true });
    m22PickPanel.classList.add('hidden');
    return;
  }

  // 描画
  m22PickPanel.innerHTML = '<span class="cap">持っていない数値の情報トークンを2つまで選んでください。</span>';
  candidates.forEach(nn=>{
    const d = document.createElement('div');
    d.className = 'token black' + (pickedSet.has(nn) ? ' disabled' : '');
    d.textContent = String(nn);
    d.onclick = async ()=>{
      if (pickedSet.has(nn)) return;           // 既に選択済み
      if (picked.length >= maxPick) return;    // 上限

      const next = picked.concat(nn);

      // 選び切ったら：m22Tokens + m22Done を同時に保存 → パネルを即非表示
      if (next.length >= maxPick) {
        await update(ref(db, `rooms/${state.roomCode}/tables/${myIdx}`), {
          m22Tokens: next,
          m22Done: true
        });
        m22PickPanel.classList.add('hidden');
      } else {
        // まだ上限に達していない：選択だけ保存して続行
        await update(ref(db, `rooms/${state.roomCode}/tables/${myIdx}`), { m22Tokens: next });
      }
    };
    m22PickPanel.appendChild(d);
  });

  m22PickPanel.classList.remove('hidden');
}

      });

      const title = document.getElementById('missionDetailTitle');
      if (title && title.parentNode === footer) footer.insertBefore(row, title);
      else footer.appendChild(row);
    }
  }

  // ---- センター（アイテム下） ----
  const bar = document.getElementById('itemsBar');
  if (!bar) return;
  { const ex = document.getElementById('m29CenterRow'); if (ex) ex.remove(); }

  const centerRaw = Array.isArray(v.m29_center) ? v.m29_center : [];
  const stock = Array.isArray(v.m29_stock) ? v.m29_stock : [];
  const centerSeen = new Set();
  const center = centerRaw.filter((obj, i) => {
    const key = String(obj?.cid || `${obj?.n}:${obj?.by}:${i}`);
    if (centerSeen.has(key)) return false;
    centerSeen.add(key);
    return true;
  });

  const stackStep = 2;
  const maxM29StockLayers = 6;
  const visibleStock = stock.slice(-maxM29StockLayers);
  const nowStockOffset = stackStep * Math.max(0, visibleStock.length - 1);

  if (state.isHost) ensureM29AutoDrop(v);
  if (center.length > 0 || stock.length > 0) {
    const row = document.createElement('div');
    row.id = 'm29CenterRow';
    row.className = 'numlane';
    row.style.display = 'grid';
    row.style.gridTemplateColumns = 'auto minmax(0,1fr) auto';
    row.style.justifyContent = 'stretch';
    row.style.width = '100%';
    row.style.alignItems = 'flex-start';
    row.style.overflow = 'visible';

    const leftArea = document.createElement('div');
    leftArea.style.display = 'flex';
    leftArea.style.alignItems = 'center';
    leftArea.style.minWidth = '32px';

    if (visibleStock.length > 0) {
      const holder = document.createElement('div');
      holder.className = 'numcard-holder';
      const baseW = 32;
      const step = stackStep;
      const totalW = baseW + step * Math.max(0, visibleStock.length - 1);
      holder.style.width = `${totalW}px`;

      visibleStock.forEach((obj, k) => {
        const cell = document.createElement('div');
        cell.className = (k === 0) ? 'numcard' : 'numcard overlay';
        cell.style.display = 'grid';
        cell.style.placeItems = 'center';
        cell.style.fontWeight = 'bold';
        cell.style.backgroundImage = `url('${imgNumber(obj.n)}')`;
        cell.style.backgroundSize = 'cover';
        cell.style.backgroundPosition = 'center';
        if (k > 0) {
          const off = step * k;
          cell.style.position = 'absolute';
          cell.style.left = `${off}px`;
          cell.style.top = `${off}px`;
          cell.style.opacity = `${Math.max(0.6, 1 - 0.05 * k)}`;
          cell.style.zIndex = String(100 + k);
        }
        holder.appendChild(cell);
      });
      leftArea.appendChild(holder);
    }

    const centerArea = document.createElement('div');
    centerArea.style.display = 'flex';
    centerArea.style.gap = '6px';
    centerArea.style.justifyContent = 'center';
    centerArea.style.flexWrap = 'nowrap';
    centerArea.style.alignItems = 'flex-start';

    center.forEach((obj, idx) => {
      const cardId = obj?.cid || null;
      const cell = document.createElement('div');
      cell.className = 'numcard';
      cell.style.display = 'grid';
      cell.style.placeItems = 'center';
      cell.style.fontWeight = 'bold';
      cell.style.backgroundImage = `url('${imgNumber(obj.n)}')`;
      cell.style.backgroundSize = 'cover';
      cell.style.backgroundPosition = 'center';
      cell.title = 'クリックしたプレイヤーが獲得';

      cell.onclick = async (ev) => {
        try {
          if (myIdx < 0) return;
          openMenu(ev.clientX, ev.clientY, [{
            label: '獲得する',
            action: async ()=>{
              const rRef = ref(db, `rooms/${state.roomCode}`);
              const tRef = ref(db, `rooms/${state.roomCode}/tables/${myIdx}`);
              const [rSnap, tSnap] = await Promise.all([get(rRef), get(tRef)]);
              const R = rSnap.val() || {};
              const T2 = tSnap.val() || {};
              const cur = Array.isArray(R.m29_center) ? R.m29_center.slice() : [];
              const hand = Array.isArray(T2.m29Hand) ? T2.m29Hand.slice() : [];

              let pickIdx = -1;
              if (cardId) {
                pickIdx = cur.findIndex(x => x?.cid === cardId);
              }
              if (pickIdx < 0 && idx >= 0 && idx < cur.length) {
                const cand = cur[idx];
                if (cand && cand.n === obj.n && (cand.by|0) === (obj.by|0)) pickIdx = idx;
              }
              if (pickIdx < 0) return;

              const curObj = cur[pickIdx];
              hand.push(curObj.n);
              cur.splice(pickIdx, 1);
              await Promise.all([
                update(tRef, { m29Hand: hand }),
                update(rRef, { m29_center: cur }),
              ]);
            }
          }]);
        } catch(e){ console.error(e); }
      };

      centerArea.appendChild(cell);
    });

    const rightSpacer = document.createElement('div');
    rightSpacer.style.minWidth = `${leftArea.getBoundingClientRect().width || 32}px`;

    row.appendChild(leftArea);
    row.appendChild(centerArea);
    row.appendChild(rightSpacer);
    row.style.marginBottom = `${nowStockOffset}px`;
    bar.insertAdjacentElement('afterend', row);

    requestAnimationFrame(() => {
      const w = Math.ceil(leftArea.getBoundingClientRect().width || 32);
      rightSpacer.style.minWidth = `${w}px`;
    });
  }
}

    ].slice();

    const n = v.tableCount|0;
    const shown = deck.slice(0, Math.max(1,n)); // 人数分

    // c8が含まれているなら左右の数値を1枚ずつランダムに決める（1..12）
    let c8Sides = null;
    if (shown.some(s => /c8\.(png|jpg)$/i.test(s))) {
  const [L, R] = pickK(MATERIALS.numbers, 2); // ← ユニーク抽選
  c8Sides = [L, R];

function autoFitChallengeTextbox(textEl){
  if (!textEl) return;
  const candidates = [7, 6, 5];
  for (const size of candidates){
    textEl.style.fontSize = `${size}px`;
    if (textEl.scrollHeight <= textEl.clientHeight + 0.5){
      return;
    }
  }
  textEl.style.fontSize = '5px';
}

function scheduleChallengeTextboxAutoFit(textEl){
  requestAnimationFrame(() => {
    if (!textEl.isConnected){
      requestAnimationFrame(() => autoFitChallengeTextbox(textEl));
      return;
    }
    autoFitChallengeTextbox(textEl);
  });
}

    const ov = document.createElement('div');
    ov.id = 'conZoomOverlay';

      ev.stopPropagation();

function renderM55(v){
  const isM55 = ((v?.mission?.id|0) === 55 || (v?.mission?.id|0) === 60);
  const rowId = 'm55Row';
  const old   = document.getElementById(rowId);
  if (!isM55){ if (old) old.remove(); return; }

  // 初回はメタを用意させる
  if (!Array.isArray(v?.meta?.m55_shown)) { ensureM55MetaInit(v); if (old) old.remove(); return; }

  if (old) old.remove();
  const lane = document.createElement('div');
  lane.id = rowId;
  lane.className = 'conlane m55-lane';

  const shown = v.meta.m55_shown || [];
  const sides = v.meta.m55_c8Sides || null;
  const backByIndex = Array.isArray(v?.meta?.m55_backByIndex) ? v.meta.m55_backByIndex : [];
  if ((v?.tableCount|0) >= 5) lane.classList.add('five-plus');

  shown.forEach((fname, idx)=>{
    const isC8 = /c8\.(png|jpg)$/i.test(fname);
    const isBack = !!backByIndex[idx];

    const wrap = document.createElement('div');
    wrap.className = 'm55-card-wrap';
    if (isC8 && !isBack) wrap.classList.add('c8-spacing');

    const setCardFace = async(nextBack)=>{
      const next = backByIndex.slice();
      next[idx] = !!nextBack;
      await update(ref(db, `rooms/${state.roomCode}/meta`), { m55_backByIndex: next });
    };

    const cc = isBack ? buildChallengeBackCard() : buildChallengeCard(fname);
    cc.onclick = async (ev)=>{
      ev.stopPropagation();
      if (isBack){
        await setCardFace(false);
        return;
      }
      openChallengeZoom(fname, async ()=>{
        await setCardFace(true);
      });
    };
    wrap.appendChild(cc);

    if (!isBack && isC8 && Array.isArray(sides) && sides.length===2){
      const leftNum  = document.createElement('div');
      leftNum.className = 'm55-c8-side left';
      leftNum.style.backgroundImage = `url('${imgNumber(sides[0])}')`;
      wrap.appendChild(leftNum);

      const rightNum = document.createElement('div');
      rightNum.className = 'm55-c8-side right';
      rightNum.style.backgroundImage = `url('${imgNumber(sides[1])}')`;
      wrap.appendChild(rightNum);
    }

    lane.appendChild(wrap);
  });

  mountLaneUnderItemsBar(lane);

// #31専用（所有カード用）：拡大 → 「裏返す」ポップ → m31Face を front/back トグル
function openConstraintZoom31Owned(letter, tableIdx){
  try{
    // 既存オーバーレイ掃除
    const old = document.getElementById('conZoomOverlay');
    if (old) old.remove();

    const ov = document.createElement('div');
    ov.id = 'conZoomOverlay';
    ov.addEventListener('click', (e)=>{ if(e.target===ov) closeConstraintZoom(); });

    const wrap = document.createElement('div');
    wrap.className = 'conzoom-wrap';

    const big = document.createElement('div');
    big.className = 'conzoom-card';

    // 現在の face を取得して見た目を合わせる
    const face = state?.watching?.tables?.[tableIdx]?.m31Face || 'front';
    if (face==='back'){
      big.classList.remove('constraint-face');
      big.style.backgroundImage = `url('${imgConstraintBack()}')`;
      big.querySelector('.constraint-alpha')?.remove();
      big.querySelector('.constraint-desc')?.remove();
    }else{
      paintConstraintCard(big, letter);
    }

    const renderMenu = ()=>{
      // 既存メニューを消してから再生成（ラベルを最新状態に）
      wrap.querySelector('.conzoom-menu')?.remove();
      const menu = document.createElement('div');
      menu.className = 'conzoom-menu';
      const cur = state?.watching?.tables?.[tableIdx]?.m31Face || 'front';
      const btnFlip = document.createElement('button');
      btnFlip.textContent = (cur === 'back') ? '表に戻す' : '裏返す';
      btnFlip.onclick = async (ev)=>{
        ev.stopPropagation();
        try{
          const next = (cur === 'back') ? 'front' : 'back';
          await update(ref(db, `rooms/${state.roomCode}/tables/${tableIdx}`), { m31Face: next });
        }catch(e){ console.error('[M31 flip]', e); }
        closeConstraintZoom();
      };
      menu.appendChild(btnFlip);
      wrap.appendChild(menu);
    };

    // カードをタップするとメニューの表示/非表示をトグル（任意操作）
    big.addEventListener('click', (e)=>{
      e.stopPropagation();
      const m = wrap.querySelector('.conzoom-menu');
      if (m) m.remove(); else renderMenu();
    });

    wrap.appendChild(big);
    ov.appendChild(wrap);
    document.body.appendChild(ov);
  }catch(e){ console.error(e); }
}

/* ここから追加：#32/#37 制約カードの山札（同期表示） */
// 共有：meta 初期化（ミッションIDごと）
async function ensureConDeckMetaInit(vNow, mid){
  const v = vNow || state.watching; if (!v) return;
  if ((v?.mission?.id|0) !== mid) return;
  const keyDeck = `m${mid}_deck`;
  const keyDisc = `m${mid}_discards`;
  if (Array.isArray(v?.meta?.[keyDeck])) return;   // 既に初期化済み
  if (!state.isHost) return;                        // 初期化はホストのみ

  // 制約カード A〜L をシャッフルして山札に
  const deck = 'ABCDEFGHIJKL'.split(''); shuffle(deck);
  await update(ref(db, `rooms/${state.roomCode}/meta`), {
    [keyDeck]: deck,
    [keyDisc]: []
  });
}

// 共有：描画（mid=32/37 を切替）
function renderConDeckSync(v, mid){
  const isTarget = ((v?.mission?.id|0) === mid);
  const rowId = `m${mid}ConRow`;
  const old = document.getElementById(rowId);
  if (!isTarget){ if (old) old.remove(); return; }

  const keyDeck = `m${mid}_deck`;
  const keyDisc = `m${mid}_discards`;
  const LONG_PRESS_MS = 450;

  const returnConstraintCardToDeckTop = async (ch)=>{
    if (!state.isHost) return;
    try{
      const mRef = ref(db, `rooms/${state.roomCode}/meta`);
      const mSnap = await get(mRef);
      const meta = mSnap.val() || {};
      const D  = Array.isArray(meta[keyDeck]) ? meta[keyDeck].slice() : [];
      const Xs = Array.isArray(meta[keyDisc]) ? meta[keyDisc].slice() : [];
      if (!D.includes(ch) || !Xs.includes(ch)) return;

      const nextDiscards = Xs.filter(v => v !== ch);
      const nextDeck = [ch, ...D.filter(v => v !== ch)];
      await update(mRef, { [keyDeck]: nextDeck, [keyDisc]: nextDiscards });
    }catch(e){ console.error(e); }
  };

  // 初回：ホストが meta を用意（未用意なら一旦抜けて次の onValue で描画）
  if (!Array.isArray(v?.meta?.[keyDeck])){ ensureConDeckMetaInit(v, mid); if (old) old.remove(); return; }

  if (old) old.remove();
  const lane = document.createElement('div');
  lane.id = rowId;
  lane.className = 'conlane';  // 制約カード帯（既存CSS）

  // 山札ボタン（制約カード裏面）
  const deckBtn = document.createElement('div');
  deckBtn.title = 'めくる';

  // 右側：公開札（積み重ね）
  const pile = document.createElement('div');
  pile.className = 'numcard-holder';
  pile.style.position = 'relative';

  lane.appendChild(deckBtn);
  lane.appendChild(pile);

  // 再描画
  const refresh = ()=>{
    const d = (v?.meta?.[keyDeck]||[]);
    const x = (v?.meta?.[keyDisc]||[]);
    const remain = d.filter(ch => !x.includes(ch)).length;
    renderDeckBackStack(deckBtn, remain, { kind:'constraint', backImage:'./conback.jpg', emptyBorderRadius:'6px' });
    pile.innerHTML = '';

    const baseH = cssNum('--con-h') || cssNum('--item-h') || 75;
    pile.style.height = baseH + 'px';
    lane.style.marginBottom = '0px';

    // discards を積み重ね表示（#32/#37：縦はずらさず、横だけ0.5pxずらす）
    x.forEach((ch, i)=>{
      const node = document.createElement('div');
      node.className = 'concard';
      paintConstraintCard(node, ch);
      node.title = state.isHost
        ? 'タップで拡大 / 長押しで山札トップへ戻す'
        : '拡大';

      let holdTimer = null;
      let longPressed = false;
      const clearHold = ()=>{
        if (holdTimer){
          clearTimeout(holdTimer);
          holdTimer = null;
        }
      };
      node.addEventListener('pointerdown', (ev)=>{
        if (!state.isHost || ev.button !== 0) return;
        longPressed = false;
        clearHold();
        holdTimer = setTimeout(async ()=>{
          longPressed = true;
          await returnConstraintCardToDeckTop(ch);
        }, LONG_PRESS_MS);
      });
      node.addEventListener('pointerup', clearHold);
      node.addEventListener('pointercancel', clearHold);
      node.addEventListener('pointerleave', clearHold);
      node.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        if (longPressed){
          longPressed = false;
          ev.preventDefault();
          return;
        }
        openConstraintZoom(ch);
      });

      if (i>0){
        const off = i*0.5;
        node.style.position = 'absolute';
        node.style.left = off + 'px';
        node.style.top  = '0px';
      }
      pile.appendChild(node);
      refreshConstraintPileFace(pile);
    });
  };
  refresh();

  // 1枚めくる：山札順で未使用の1枚を discards に積む（全員へ同期）
  deckBtn.onclick = async ()=>{
    try{
      const mRef = ref(db, `rooms/${state.roomCode}/meta`);
      const mSnap = await get(mRef);
      const meta = mSnap.val() || {};
      const D  = Array.isArray(meta[keyDeck]) ? meta[keyDeck].slice() : [];
      const Xs = Array.isArray(meta[keyDisc]) ? meta[keyDisc].slice() : [];
      const next = D.find(ch => !Xs.includes(ch));
      if (next == null){
        // すべて使い切ったら再生成メニュー（#30 などと同様の運用にするならここで再構築しても可）
        return;
      }
      Xs.push(next);
      await update(mRef, { [keyDisc]: Xs });
    }catch(e){ console.error(e); }
  };

  // DOM：アイテム列の直下
  mountLaneUnderItemsBar(lane);
}

/* ここから追加：ミッション43 */
function renderM43(v){
  const isM43 = ((v?.mission?.id|0) === 43);
  const old = document.getElementById('m43Nano');

  // ミッション43以外 → 後片付け
  if (!isM43){
    if (old) old.remove();
    document.getElementById('nanoRow')?.remove(); // 旧・新UIの掃除
    return;
  }

  // 初期化：ホストが m43_nano を用意
  if ((v?.meta?.m43_nano|0) === 0){
    if (state.isHost){
      const P = (v?.tableCount|0) || (v?.tables?.length|0) || 0;
      const initNano = (P>=5) ? 3 : 4;
      update(ref(db, `rooms/${state.roomCode}/meta`), { m43_nano: initNano, m43_pos: 0, m43_prevPos: 0 });
    }
    if (old) old.remove();
    document.getElementById('nanoRow')?.remove();
    return;
  }

  const pos     = v?.meta?.m43_pos|0;
  const prevPos = v?.meta?.m43_prevPos|0;
  const nanoLv  = clamp(v?.meta?.m43_nano|0, 0, 4);

  if (!pos){
    if (old) old.remove();
    document.getElementById('nanoRow')?.remove();
    return;
  }

  const goingLeft = (prevPos>0 && pos < prevPos);
  const img = goingLeft ? `./nano${nanoLv}left.png` : `./nano${nanoLv}.png`;

  // 行コンテナ（itemsBar の直下）を用意
  const itemsBar = document.getElementById('itemsBar');
  if (!itemsBar) return;
  let row = document.getElementById('nanoRow');
  if (!row){
    row = document.createElement('div');
    row.id = 'nanoRow';
    row.className = 'nano-row';
    itemsBar.insertAdjacentElement('afterend', row);
  }

  const node = old || document.createElement('div');
  node.id = 'm43Nano';
  node.className = 'm43-nano';
  node.style.backgroundImage = `url("${img}")`;

  node.onclick = (ev)=>{
    openMenu(ev.clientX, ev.clientY, [
      { label:'回収', action: async ()=>{
      /* ここから追加：#43 回収タップ → A群から1枚を自分の手札へ */
      const code = state.roomCode;
      const myTable = state.seatedTable;
      const m43AnimTotalMs = 3200; // runM43InsertAnimation の所要時間(余裕込み)
      if (myTable == null) { alert('席に座っているプレイヤーのみ操作できます'); return; }

      // メタとテーブルを取得
      const mRef = ref(db, `rooms/${code}/meta`);
      const tRef = ref(db, `rooms/${code}/tables`);
      const [mSnap, tSnap] = await Promise.all([ get(mRef), get(tRef) ]);
      const meta = mSnap.val() || {};
      const tbls = tSnap.val() || [];
      const A = Array.isArray(meta.m43_A) ? meta.m43_A.slice() : [];

      // A群から1枚取り出し（先頭＝一番上）
      let nanoNext = null;
      if (A.length > 0 && tbls[myTable]) {
        const n = A.shift(); // number
        const T = tbls[myTable];
        const hand = Array.isArray(T.hand) ? T.hand : [];
        const newId = crypto.randomUUID();
        const newCard = {
          id: newId,
          num: n,
          kind: 'normal',
          open: false,
          ownerId: T.playerId || null,
          tokens: [],
          m43Added: true,
          markUntil: Date.now() + 5000   // ← 5秒間「▼」表示
        };

        // 同値は「右端」に入れる
        let insertIndex = 0;
        while (insertIndex < hand.length && (hand[insertIndex]?.num|0) <= n) insertIndex++;
        hand.splice(insertIndex, 0, newCard);

        const alpha = 'abcdefghijklmnopqrstuvwxyz';
        hand.forEach((c,i)=> c.alpha = alpha[i % alpha.length]);
        T.hand = hand;

        // DB へ反映（テーブル更新＋A群を更新）
        await Promise.all([
          set(ref(db, `rooms/${code}/tables`), tbls),
          update(mRef, {
            m43_A: A,
            m43_insertAnim: {
              id: `${Date.now()}_${newId}`,
              table: myTable,
              insertIndex,
              cardId: newId,
              num: n,
              startedAt: Date.now()
            }
          })
        ]);

        // nano を即時で減らすと他端末で飛び元が消えてアニメ中断するため、
        // カード移動アニメ完了後に段階を下げる（全員表示のため）
        const cur = (state.watching?.meta?.m43_nano|0);
        nanoNext = Math.max(0, cur - 1);
      }

      if (nanoNext != null){
        setTimeout(()=>{
          update(mRef, { m43_nano: nanoNext, m43_updatedAt: Date.now() }).catch(()=>{});
        }, m43AnimTotalMs);
      }
      }
      }
    ]);
  };

  // 位置は checklist のセル中央に合わせて「nanoRow」内で left を決める
  const cells = tablesEl.querySelectorAll('.checklist .check-item');
  const target = cells[pos-1];
  if (!target){ if (node.isConnected) node.remove(); row.remove(); return; }
  const rb = target.getBoundingClientRect();
  const rrow = row.getBoundingClientRect();
const x = rb.left - rrow.left + (rb.width/2) - 28; // 56px の半分
node.style.left = `${x}px`;
node.style.top  = `0px`;
  if (!node.isConnected) row.appendChild(node);
}


function runM43InsertAnimation(v){
  const anim = v?.meta?.m43_insertAnim;
  if (!anim?.id) return;
  if (state._m43AnimFinishedId === anim.id) return;
  if (state._m43AnimRunningId === anim.id) return;
  state._m43AnimRunningId = anim.id;

  const tableIdx = anim.table|0;
  const insertIndex = anim.insertIndex|0;
  const shiftPx = cssNum('--card-w') + cssNum('--card-gap');
  const shiftMs = 260;
  const settleDelayMs = 2000;
  const flyMs = 520;

  const wraps = Array.from(document.querySelectorAll(`.card-wrap[data-table="${tableIdx}"]`));
  wraps.forEach(w=>{
    const ci = Number(w.dataset.cardIndex || -1);
    const cid = String(w.dataset.cardId || '');
    if (ci > insertIndex && cid !== String(anim.cardId || '')) {
      w.style.transition = 'none';
      w.style.transform = `translateX(${-shiftPx}px)`; // 旧位置から開始
      void w.offsetWidth; // reflow
      w.style.transition = `transform ${shiftMs}ms ease`;
      w.style.transform = ''; // 最終位置へ（= 右へ1枚分）
      setTimeout(()=>{ w.style.transition=''; }, shiftMs + 40);
    }
  });

  const targetSelector = `.card-wrap[data-table="${tableIdx}"][data-card-id="${String(anim.cardId||'')}"]`;
  let hiddenWrap = document.querySelector(targetSelector);
  if (hiddenWrap){
    hiddenWrap.classList.add('m43-pending-arrival'); // α帯は残してカード面だけ隠す
  }

  setTimeout(()=>{
    const nano = document.getElementById('m43Nano');
    const targetWrap = document.querySelector(targetSelector);
    if (!nano || !targetWrap){
      if (hiddenWrap){ hiddenWrap.classList.remove('m43-pending-arrival'); }
      state._m43AnimRunningId = null;
      return;
    }

    const targetCard = targetWrap.querySelector('.card') || targetWrap;
    const table = (v?.tables||[])[tableIdx] || {};
    const showFront = table.playerId === state.userId;

    const a = nano.getBoundingClientRect();
    const b = targetCard.getBoundingClientRect();
    if (!Number.isFinite(a.left) || !Number.isFinite(b.left)) {
      targetWrap.classList.remove('m43-pending-arrival');
      state._m43AnimRunningId = null;
      return;
    }

    const fly = document.createElement('div');
    fly.className = `m43-fly-card ${showFront ? 'front' : 'back'}`;
    fly.style.left = `${a.left + (a.width/2) - (cssNum('--card-w')/2)}px`;
    fly.style.top = `${a.top + (a.height/2) - (cssNum('--card-h')/2)}px`;

    if (showFront){
      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = String(anim.num ?? '');
      num.classList.toggle('tight-code', [10.1, 10.5, 11.1, 11.5].includes(Number(anim.num)));
      fly.appendChild(num);

      const bot = document.createElement('div');
      bot.className = 'img-bottom';
      bot.style.backgroundImage = 'url("./codenumber.jpg")';
      fly.appendChild(bot);
    }

    document.body.appendChild(fly);
    requestAnimationFrame(()=>{
      fly.style.transition = `left ${flyMs}ms ease, top ${flyMs}ms ease`;
      fly.style.left = `${b.left}px`;
      fly.style.top = `${b.top}px`;
    });
    setTimeout(()=>{
      fly.remove();
      targetWrap.classList.remove('m43-pending-arrival');
      hiddenWrap = null;
      state._m43AnimFinishedId = anim.id;
      state._m43AnimRunningId = null;
    }, flyMs + 80);
  }, shiftMs + settleDelayMs);
}

/* ==== ミッション59：各 checklistbox の直上に12数値カード（固定ランダム）
   ＋ nano（カード上半分に重ねる：セル内相対配置版） ==== */
async function renderM59(v){
  const isM59 = ((v?.mission?.id|0) === 59);
  if (!isM59){
    document.querySelectorAll('.m59-row').forEach(n => n.remove());
    document.getElementById('m59Nano')?.remove();
    return;
  }

  // 対象行（checklistbox が無ければ .checklist をフォールバック）
  const boxes   = Array.from(tablesEl.querySelectorAll('.checklistbox'));
  const targets = boxes.length ? boxes : Array.from(tablesEl.querySelectorAll('.checklist'));
  if (!targets.length) return;

  // ゲームごと固定の12枚（初回はホストが保存）
  let nums = v?.meta?.m59Nums;
  if (!Array.isArray(nums) || nums.length !== 12){
    nums = MATERIALS.numbers.slice();
    shuffle(nums);
    if (state.isHost){
      await update(ref(db, `rooms/${state.roomCode}/meta`), { m59Nums: nums });
    }
  }

  // 既存レーンを掃除
  document.querySelectorAll('.m59-row').forEach(n => n.remove());

  // 各 checklistbox の直前に12枚レーンを新設
  targets.forEach((boxEl, rowIdx) => {
    const lane = document.createElement('div');
    lane.className = 'm59-row';
    lane.style.display = 'grid';
    lane.style.gridTemplateColumns = 'repeat(12, 1fr)';
    lane.style.columnGap = '2px';
    lane.style.width = '100%';
    // チェックリストの左マージンに合わせてずらす（横幅見た目一致）
    lane.style.margin = '0 0 6px 10px';
    lane.style.overflow = 'visible';

    nums.forEach((n, idx) => {
      const cell = document.createElement('div');
      cell.className = 'm59-cell';
      cell.style.position = 'relative';
      cell.style.display  = 'grid';
      cell.style.placeItems = 'center';

      const card = document.createElement('div');
      card.className = 'numcard m59num';
      card.style.width  = '30px'; // #59 は少し小さく
      card.style.height = '46px';
      card.style.backgroundImage = `url('${imgNumber(n)}')`;
      card.title = String(n);

      card.onclick = async () => {
        await update(ref(db, `rooms/${state.roomCode}/meta`), {
          m59_row: rowIdx,        // 0-based
          m59_pos: (idx + 1),     // 1..12
          m59_updatedAt: Date.now()
        });
      };

      cell.appendChild(card);
      lane.appendChild(cell);
    });

    boxEl.parentNode.insertBefore(lane, boxEl); // 真上に差し込む
  });

  // === nano を描画（セル内相対配置） ===
  const rowIndex = (v?.meta?.m59_row ?? 0) | 0;
  const posIndex = (v?.meta?.m59_pos | 0);  // 1..12
  const goLeft   = !!(v?.meta?.m59_left);

  const lanes = Array.from(tablesEl.querySelectorAll('.m59-row'));
  if (!posIndex || !lanes[rowIndex]){ document.getElementById('m59Nano')?.remove(); return; }

  const targetCell = lanes[rowIndex].children[posIndex - 1];
  if (!targetCell){ document.getElementById('m59Nano')?.remove(); return; }

  // 既存を確実に一掃（常に1つだけ）
  document.getElementById('m59Nano')?.remove();

  const node = document.createElement('div');
  node.id = 'm59Nano';
  node.className = 'm43-nano m59-nano'; // 56x56 既存CSSを流用
  node.style.backgroundImage = `url("${goLeft ? './nano0left.png' : './nano0.png'}")`;

  // ★ここが「上半分重ね」：セル内基準で上辺に中心を合わせる
  node.style.left   = '50%';
  node.style.top    = '-10px';
  node.style.transform = 'translate(-50%, -50%)';
  node.style.pointerEvents = 'auto';

  // クリックで向きトグル
  node.onclick = (ev)=>{
    openMenu(ev.clientX, ev.clientY, [
      { label: (goLeft ? '右向きにする' : '左向きにする'),
        action: async ()=>{
          await update(ref(db, `rooms/${state.roomCode}/meta`), {
            m59_left: !goLeft,
            m59_updatedAt: Date.now()
          });
        }
      }
    ]);
  };

  targetCell.appendChild(node);
}

  
// ミッション57：同数4枚公開 → 制約カードをアイテム列の右に表示（完全重ね）。
// 重ね位置には数値カードは出さない。ペア欄には数値＋制約ペアを表示。
async function renderM57(v){
  const isM57 = ((v?.mission?.id|0) === 57);
  if (!isM57){
    // #57から離れた瞬間に片付け
    document.getElementById('m57Grid')?.remove();
    document.querySelectorAll('.m57-grid').forEach(n=>n.remove());
    document.getElementById('m57Sel')?.remove();
    document.getElementById('m57Done')?.remove();
    document.getElementById('m57Stack')?.remove();
    document.getElementById('m57StackRight')?.remove();
    document.getElementById('conZoomOverlay')?.remove();
    return;
  }

  if (state._m57Rendering) return;
  state._m57Rendering = true;

  try {
    // 再描画前の掃除
    document.getElementById('m57Grid')?.remove();
    document.querySelectorAll('.m57-grid').forEach(n=>n.remove());
    document.getElementById('m57Sel')?.remove();
    document.getElementById('m57Done')?.remove();
    document.getElementById('m57Stack')?.remove();
    document.getElementById('m57StackRight')?.remove();

    const itemsBar = document.getElementById('itemsBar');
    if (!itemsBar) return;

    // 数字→制約 A..L の対応（ホストが初回保存）
    let letters = v?.meta?.m57Letters;
    if (!letters) {
      letters = Array.from({length:12}, (_,i)=>String.fromCharCode(97+i)); // a..l
      if (state.isHost) {
        await update(ref(db, `rooms/${state.roomCode}/meta`), { m57Letters: letters });
      }
    }

    // 4枚公開が成立した数字の抽出
    const openCountByNum = {};
    (v.tables || []).forEach(T => {
      (T.hand || []).forEach(c => {
        if (c?.kind === 'normal' && c.open === true) {
          const n = c.num | 0;
          openCountByNum[n] = (openCountByNum[n] || 0) + 1;
        }
      });
    });
    const achievedSet = new Set(
      Object.entries(openCountByNum)
        .filter(([, cnt]) => (cnt|0) >= 4)
        .map(([n]) => Number(n))
    );

    // まだ成立していない「数値＋制約」ペアの確認グリッド（アイテム列の直下）
    {
      const grid = document.createElement('div');
      grid.id = 'm57Grid';
      grid.className = 'm57-grid';
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = 'repeat(4, auto)';
      grid.style.gap = '6px';
      grid.style.marginTop = '6px';

      for (let i = 1; i <= 12; i++) {
        if (achievedSet.has(i)) continue;

        const wrap = document.createElement('div');
        wrap.style.display = 'flex';
        wrap.style.alignItems = 'center';
        wrap.style.marginRight = '-6px';

        // 数値カード（← ペア欄には表示する）
        const num = document.createElement('div');
        num.className = 'numcard';
        num.style.backgroundImage = `url('${imgNumber(i)}')`;

        // 制約カード（拡大のみ）
        const con = document.createElement('div');
        con.className = 'concard';
        con.style.marginLeft = '-6px';
        paintConstraintCard(con, letters[i-1]);
        con.onclick = () => {
          document.getElementById('conZoomOverlay')?.remove();
          const overlay = document.createElement('div');
          overlay.id = 'conZoomOverlay';
          const wrap = document.createElement('div');
          wrap.className = 'conzoom-wrap';
          const big = document.createElement('div');
          big.className = 'conzoom-card';
          paintConstraintCard(big, letters[i-1]);
          wrap.appendChild(big);
          overlay.appendChild(wrap);
          overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
          document.body.appendChild(overlay);
        };

        wrap.appendChild(num);
        wrap.appendChild(con);
        grid.appendChild(wrap);
      }

      itemsBar.insertAdjacentElement('afterend', grid);
    }

    // （任意）選ばれた制約をアイテム右に単体表示したい場合のミラー
    {
      const di = document.getElementById('di');
      const sel = v?.meta?.m57Chosen;
      if (di && sel) {
        const img = document.createElement('div');
        img.id = 'm57Sel';
        img.className = 'concard';
        img.style.marginRight = '6px';
        paintConstraintCard(img, sel);
        img.onclick = () => {
          document.getElementById('conZoomOverlay')?.remove();
          const overlay = document.createElement('div');
          overlay.id = 'conZoomOverlay';
          const wrap = document.createElement('div');
          wrap.className = 'conzoom-wrap';
          const big = document.createElement('div');
          big.className = 'conzoom-card';
          paintConstraintCard(big, sel);
          wrap.appendChild(big);
          overlay.appendChild(wrap);
          overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
          document.body.appendChild(overlay);
        };
        di.insertAdjacentElement('beforebegin', img); // アイテムの右に表示
      }
    }

    // 右側スタック（数値カードは出さない／制約のみ完全重ね）
    {
      const achieved = Array.from(achievedSet);
      if (!achieved.length) return;

      // 並び順：既存順をベースに、新規は末尾（＝最上面）に追加
      let order = Array.isArray(v?.meta?.m57Order) ? v.meta.m57Order.slice() : [];
      const before = new Set(order);
      order = order.filter(n => achievedSet.has(n));
      achieved.forEach(n => { if (!before.has(n)) order.push(n); });

      // ホストが同期
      if (state.isHost) {
        const changed =
          (v?.meta?.m57Order?.length||0) !== order.length ||
          (v?.meta?.m57Order||[]).some((x,i)=> x !== order[i]);
        if (changed) {
          await update(ref(db, `rooms/${state.roomCode}/meta`), {
            m57Order: order,
            m57UpdatedAt: Date.now()
          });
        }
      }

      const di = document.getElementById('di');
      const done = document.createElement('div');
      done.id = 'm57Done';
      done.style.display = 'flex';
      done.style.alignItems = 'center';

      // 制約の完全重ね用ボックス（同一座標・同サイズに配置）
      const stackBox = document.createElement('div');
      stackBox.id = 'm57Stack';
      stackBox.style.position = 'relative';
      stackBox.style.width  = `var(--con-w, var(--item-w, 50px))`;
      stackBox.style.height = `var(--con-h, var(--item-h, 75px))`;

      order.forEach((n, i) => {
        const con = document.createElement('div');
        con.className = 'concard';
        con.style.position = 'absolute';
        // 完全に同じ位置（下を完全に隠す）
        con.style.left = '0';
        con.style.top  = '0';
        con.style.width  = '100%';
        con.style.height = '100%';
        paintConstraintCard(con, letters[n-1]);
        con.style.zIndex = String(100 + i); // 後のものほど上
        con.onclick = () => {
          document.getElementById('conZoomOverlay')?.remove();
          const overlay = document.createElement('div');
          overlay.id = 'conZoomOverlay';
          const wrap = document.createElement('div');
          wrap.className = 'conzoom-wrap';
          const big = document.createElement('div');
          big.className = 'conzoom-card';
          paintConstraintCard(big, letters[n-1]);
          wrap.appendChild(big);
          overlay.appendChild(wrap);
          overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
          document.body.appendChild(overlay);
        };
        stackBox.appendChild(con);
      });

      done.appendChild(stackBox);
      if (di) di.insertAdjacentElement('beforebegin', done);
      else itemsBar.appendChild(done);
    }

  } finally {
    state._m57Rendering = false;
  }
}


/* ここから追加：ミッション61（制約A~E配布＆交換/B=F~G、隊長の↑↓回し） */
async function ensureM61MetaInit(vNow){
  const v = vNow || state.watching; if(!v) return;
  if ((v?.mission?.id|0) !== 61) return;
  const n = (v?.tables?.length|0); if (n<=0) return;
  // 既に配り済みなら何もしない
  if (Array.isArray(v?.meta?.m61_byTable) && v.meta.m61_byTable.length === n) return;
  if (!state.isHost) return;
// デッキA = A..E をシャッフルして人数分に配る（人数が5超なら循環）
const A = ['A','B','C','D','E']; shuffle(A);
const by = Array.from({length:n}, (_,i)=> A[i % A.length]);

// ★追加：Bデッキ（F..L）をシャッフルして meta へ保存。使用済みは空で開始
const bDeck = ['F','G','H','I','J','K','L']; shuffle(bDeck);

await update(ref(db, `rooms/${state.roomCode}/meta`), {
  m61_byTable: by,
  m61_bDeck: bDeck,     // ← 追加
  m61_bUsed: [],        // ← 追加
  m61_rotAt: Date.now()
});
}

/* ここから追加：ミッション63（隊長のみ初期配布／リザーブはアイテム下／譲渡＆回収） */

// 初期メタの用意（ホストのみ）
async function ensureM63MetaInit(vNow){
  const v = vNow || state.watching; if (!v) return;
  if ((v?.mission?.id|0) !== 63) return;
  const n = (v?.tables?.length|0); if (n <= 0) return;
  if (v?.meta?.m63_init === true) return;
  if (!state.isHost) return;

  // 人数 → 初期配布数（隊長のみ）
  const per = (m)=>{
    if (m===2) return 14;
    if (m===3) return 18;
    if (m===4) return 24;
    return 30; // 5 or 6
  };

  const cap = Math.max(0, v?.captainTable|0);
  const by = {};
  for (let i=0;i<n;i++) by[i] = (i===cap ? per(n) : 0);

  await update(ref(db, `rooms/${state.roomCode}/meta`), {
    oxItem: 0,
    oxByTable: by,
    m63_init: true
  });
}

// 描画・操作
function renderM63(v){
  const isM63 = ((v?.mission?.id|0) === 63);
  // 片付け
  if (!isM63){
    document.getElementById('m63Reserve')?.remove();
    document.querySelectorAll('.table').forEach(tb=> tb.style.removeProperty('--table-h'));
    return;
  }

  // 初回メタ

 function refreshM66(layer, slots, v){
    const ccTop = layer.querySelector('.m66-line:nth-child(1) .concard');
    const mid   = layer.querySelector('.m66-line:nth-child(2)');
    const ccLeft  = mid?.querySelector('.m66-slot:nth-child(1) .concard');

    const ccBot = layer.querySelector('.m66-line:nth-child(3) .concard');

    if (ccTop){   paintConstraintCard(ccTop, slots[1]); }
    if (ccLeft){  paintConstraintCard(ccLeft, slots[3]); }

    // ラビットの座標反映
    const box = layer.querySelector('.m66-stagebox');

        if (!rab){ rab = document.createElement('div'); rab.className='m66-rabit'; box.appendChild(rab); }
        rab.style.left = (pos.x * 100) + '%';

      }else{
        if (rab) rab.remove();
      }
    }
  }

  // D&D 交換（同一固定スロット間で中身を入替）
  function bindM66Drag(node, name){
    const map = { bydi:0, top:1, bottom:2, left:3, right:4 };
    node.setAttribute('draggable','true');

    node.addEventListener('dragstart',(e)=>{
      e.dataTransfer.setData('text/plain', name);
    });
    node.addEventListener('dragover',(e)=>{ e.preventDefault(); });
    node.addEventListener('drop', async (e)=>{
      e.preventDefault();
      const src = e.dataTransfer.getData('text/plain');
      const dst = name;
      if (!src || !dst || src===dst) return;
      try{
        const mRef = ref(db, `rooms/${state.roomCode}/meta`);
        const snap = await get(mRef);
        const meta = snap.val()||{};
        const cur  = Array.isArray(meta?.m66_slots) ? meta.m66_slots.slice() : slots.slice();
        const si = map[src], di = map[dst];
        if (si==null || di==null) return;
        const tmp = cur[si]; cur[si]=cur[di]; cur[di]=tmp;
        await update(mRef, { m66_slots: cur });
      }catch(err){ console.error(err); }
    });
  }
}

// ===== M65 初期配布：隊長テーブルから全テーブルへラウンドロビン配布 =====
async function ensureM65MetaInit(vNow){
  const v = vNow || state.watching; if (!v) return;
  if ((v?.mission?.id|0) !== 65) return;
  const N = (v?.tables?.length|0); if (N <= 0) return;
  if (Array.isArray(v?.meta?.m65_byTable)) return;   // 既に初期化済み
  if (!state.isHost) return;                         // 初期化はホストのみ

  const cap = Math.max(0, v?.captainTable|0);

  // 配布順：隊長テーブル → 右回りで「全テーブル」（未着席も含む）
  const order = [];
  for (let off=0; off<N; off++){
    order.push((cap + off) % N);
  }

  // 1..12 をシャッフルして、order にラウンドロビン配布
  const deck = MATERIALS.numbers.slice(); // 想定: [1..12]
  shuffle(deck);

  const by = Array.from({length:N}, ()=> []);
  for (let k=0; k<deck.length; k++){
    const owner = order[k % order.length];
    by[owner].push(deck[k]);
  }

  await update(ref(db, `rooms/${state.roomCode}/meta`), { m65_byTable: by });
}
